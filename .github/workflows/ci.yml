name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sundays 06:00 UTC — runs the sweep against live GitHub to catch drift early.
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sweep-and-eval:
    name: Sweep + eval
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Eval (current state)
        env:
          GH_TOKEN_ARMOSPHERA: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x a1-clx
          ./a1-clx eval

      - name: Sweep (commit drift back)
        if: failure()
        env:
          GH_TOKEN_ARMOSPHERA: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./a1-clx sweep
          ./a1-clx eval
